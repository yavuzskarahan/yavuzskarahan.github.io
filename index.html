<!DOCTYPE html>
<html lang="en">
<head>
  <title>Encyclopedia Galactica</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="icon.png"/>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Arka plan resim dosyalarını içeren dizi
      var backgroundImages = ["back.jpg", "back1.png", "back2.jpg", "back4.png", "back5.jpg"];

      // Rastgele bir indeks seç
      var randomIndex = Math.floor(Math.random() * backgroundImages.length);

      // Seçilen dosya adını kullanarak arka plan resmini ayarla
      var selectedBackground = backgroundImages[randomIndex];
      document.body.style.backgroundImage = `url("${selectedBackground}")`;
    });
  </script>
</head>
<body>
  <div class="container">
    <img src="logo2.png" alt="logo" class="logo">
    <div class="searchcon">
      <form class="search-bar" action="https://www.google.com/search" method="GET">
        <input type="text" placeholder="Type to search..." id="searchQuery" name="q" required>
      </form>
    </div>
    <div class="shortcuts">

        <a href="https:\\www.cses.fi" class="shortcut">
            <img src="cses.png" alt="cses">
        </a>

      </div>

      </div>

</body>
</html>
